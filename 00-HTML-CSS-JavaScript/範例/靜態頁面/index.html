<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>靜態三件套示範</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>HTML + CSS + JavaScript</h1>
      <p class="hint">
        使用 <code>import</code>／<code>export</code> 時請以本機靜態伺服器開啟此目錄（勿只用 <code>file://</code> 雙擊）。改動
        <code>main.js</code> 或 <code>counter.js</code> 後需手動重新整理頁面。
      </p>
      <p class="count">目前數字：<span id="value">0</span></p>
      <button type="button" id="increment">+1</button>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
