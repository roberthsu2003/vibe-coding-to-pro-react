<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tsc 編譯示範（ES Module）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>HTML + CSS + Node + TypeScript</h1>
      <p class="hint">
        請先在此目錄執行 <code>npm install</code> 與 <code>npm run build</code>，產生
        <code>dist/*.js</code>。本範例為<strong>多檔案 ES Module</strong>，請用本機靜態伺服器開啟（見下方），勿只用
        <code>file://</code> 雙擊。
      </p>
      <p id="msg" class="msg">（若看到這行，代表尚未載入編譯後的 JS）</p>
    </main>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
